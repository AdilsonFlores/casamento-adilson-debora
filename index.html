<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Casamento</title>
  <!-- Fonte elegante e minimalista -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* --- ESTILOS GERAIS (MINIMALISTAS) --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: #333;
      background-color: #fafafa;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h2 {
      font-size: 2rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitulo {
      font-size: 1rem;
      color: #777;
      text-align: center;
      margin-bottom: 40px;
      font-weight: 300;
    }

    section {
      background: #ffffff;
      border: 1px solid #eaeaea;
      border-radius: 12px;
      padding: 40px 30px;
      margin-bottom: 40px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
    }

    /* --- BOTÕES GERAIS --- */
    .btn {
      background: #111;
      color: #fff;
      border: 1px solid #111;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #444;
      border-color: #444;
    }

    /* --- SEÇÃO 1: RSVP (CONFIRMAÇÃO) --- */
    .busca-box {
      max-width: 500px;
      margin: 0 auto 30px auto;
      display: flex;
      gap: 10px;
    }

    .input-text {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }

    .input-text:focus {
      outline: none;
      border-color: #111;
    }

    .membros-lista {
      max-width: 600px;
      margin: 30px auto;
      text-align: left;
    }

    .familia-titulo {
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 1.1rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }

    .membro-linha {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dotted #eee;
    }

    .opcoes-status {
      display: flex;
      gap: 10px;
    }

    .opcoes-status label {
      font-size: 0.85rem;
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .opcoes-status input[type="radio"] {
      display: none;
    }

    /* Estilos dinâmicos para quando o rádio for selecionado */
    .opcoes-status input[type="radio"]:checked + .lbl-confirmado {
      background-color: #e2ece9;
      border-color: #2f4f4f;
      color: #2f4f4f;
      font-weight: 600;
    }

    .opcoes-status input[type="radio"]:checked + .lbl-recusado {
      background-color: #fce8e6;
      border-color: #c53030;
      color: #c53030;
      font-weight: 600;
    }

    /* --- SEÇÃO 2: LISTA DE PRESENTES --- */
    .grid-presentes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      justify-content: center;
      margin-top: 20px;
    }

    .card-presente {
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 12px;
      padding: 24px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .card-presente:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .presente-imagem {
      height: 80px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .presente-imagem img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    /* Ícone SVG padrão (Line art) se não houver imagem cadastrada */
    .presente-imagem svg {
      stroke: #333;
    }

    .presente-nome {
      font-size: 1.15rem;
      font-weight: 600;
      color: #111;
      margin: 10px 0 5px 0;
    }

    .presente-descricao {
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 15px;
      min-height: 38px;
    }

    .presente-valores {
      font-size: 0.9rem;
      color: #333;
      margin-bottom: 15px;
    }

    /* Barra de Progresso das Cotas */
    .progresso-container {
      background: #f0f0f0;
      border-radius: 10px;
      height: 6px;
      width: 100%;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .progresso-barra {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.8s ease;
    }

    /* Cores das barras */
    .progresso-barra.baixo { background-color: #c3d1be; }     /* Verde Claro */
    .progresso-barra.medio { background-color: #dfc88a; }     /* Dourado */
    .progresso-barra.concluido { background-color: #2f4f4f; }  /* Slate/Verde Escuro */

    .texto-progresso {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 15px;
    }

    /* Estado de Item Concluído */
    .presente-concluido-tag {
      color: #2f4f4f;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 10px;
      border: 1px solid #2f4f4f;
      border-radius: 6px;
      background: #f4f7f6;
      display: block;
    }

    .loading {
      font-style: italic;
      color: #999;
      grid-column: 1 / -1;
      padding: 40px 0;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- ========================================== -->
    <!-- SEÇÃO 1: RSVP (CONFIRMAÇÃO DE PRESENÇA)    -->
    <!-- ========================================== -->
    <section id="rsvp">
      <h2>Confirmar Presença</h2>
      <p class="subtitulo">Digite seu nome completo para localizar sua família e confirmar sua presença.</p>
      
      <div class="busca-box">
        <input type="text" id="input-busca" class="input-text" placeholder="Ex: Maria Souza">
        <button class="btn" onclick="buscarFamilia()">Buscar</button>
      </div>

      <!-- Onde a lista de membros aparecerá após a busca -->
      <div id="rsvp-resultado" class="membros-lista"></div>
    </section>

    <!-- ========================================== -->
    <!-- SEÇÃO 2: LISTA DE PRESENTES                -->
    <!-- ========================================== -->
    <section id="presentes">
      <h2>Lista de Presentes</h2>
      <p class="subtitulo">Sua presença é nosso maior presente! Mas se desejar nos abençoar, escolha uma cota abaixo.</p>
      
      <div id="grid-presentes" class="grid-presentes">
        <div class="loading">Carregando presentes...</div>
      </div>
    </section>

  </div>

  <!-- --- JAVASCRIPT DE INTEGRAÇÃO --- -->
  <script>
    // URL ÚNICA do seu Google Apps Script (Web App)
    const URL_API = "https://script.google.com/macros/s/AKfycbyFWvs29R7VWbTlGAZu8ZJZqxnca7nPocyaFXxDQN0oJXNAYTmCM9wIGq754NGWtR2aiw/exec";
    
    let familiaEncontrada = null; // Guardará temporariamente a família buscada

    // ==========================================
    // LÓGICA DO RSVP (BUSCA E ENVIO)
    // ==========================================
    async function buscarFamilia() {
      const nomeBusca = document.getElementById("input-busca").value.toLowerCase().trim();
      const resultadoDiv = document.getElementById("rsvp-resultado");
      
      if (!nomeBusca) {
        alert("Por favor, digite um nome para buscar.");
        return;
      }

      resultadoDiv.innerHTML = "<p class='loading'>Buscando convite...</p>";

      try {
        // Busca a lista padrão de convidados
        const response = await fetch(URL_API);
        const listaFamilias = await response.json();

        // Procura a família que contém o nome digitado
        familiaEncontrada = listaFamilias.find(f => f.buscaNome.includes(nomeBusca));

        if (!familiaEncontrada) {
          resultadoDiv.innerHTML = "<p style='color: #c53030; text-align: center;'>Não encontramos nenhum convite com esse nome. Verifique a grafia ou tente com outro membro da família.</p>";
          return;
        }

        // Renderiza o formulário com os membros da família encontrada
        let html = `<p class="familia-titulo">Família: ${familiaEncontrada.familia}</p>`;
        
        familiaEncontrada.membros.forEach((membro, index) => {
          const isConfirmado = membro.status === "Confirmado";
          const isRecusado = membro.status === "Recusado";

          html += `
            <div class="membro-linha">
              <span>${membro.nome}</span>
              <div class="opcoes-status">
                <input type="radio" name="membro_${index}" id="membro_${index}_sim" value="Confirmado" ${isConfirmado ? 'checked' : ''}>
                <label for="membro_${index}_sim" class="lbl-confirmado">Vou</label>

                <input type="radio" name="membro_${index}" id="membro_${index}_nao" value="Recusado" ${isRecusado ? 'checked' : ''}>
                <label for="membro_${index}_nao" class="lbl-recusado">Não vou</label>
              </div>
            </div>
          `;
        });

        html += `
          <div style="text-align: center; margin-top: 25px;">
            <button class="btn" onclick="salvarRsvp()">Enviar Confirmação</button>
          </div>
        `;

        resultadoDiv.innerHTML = html;

      } catch (error) {
        console.error(error);
        resultadoDiv.innerHTML = "<p style='color: red; text-align: center;'>Erro ao conectar com o servidor. Tente novamente.</p>";
      }
    }

    async function salvarRsvp() {
      if (!familiaEncontrada) return;

      const resultadoDiv = document.getElementById("rsvp-resultado");
      
      // Atualiza os status dos membros com base no que foi marcado na tela
      const membrosAtualizados = familiaEncontrada.membros.map((membro, index) => {
        const radios = document.getElementsByName(`membro_${index}`);
        let statusSelecionado = "Pendente";

        for (let r of radios) {
          if (r.checked) {
            statusSelecionado = r.value;
          }
        }

        return {
          nome: membro.nome,
          status: statusSelecionado
        };
      });

      // Se nenhum membro foi alterado, avisa o usuário
      const todosPendentes = membrosAtualizados.every(m => m.status === "Pendente");
      if (todosPendentes) {
        alert("Por favor, marque 'Vou' ou 'Não vou' para pelo menos uma pessoa.");
        return;
      }

      resultadoDiv.innerHTML = "<p class='loading'>Salvando suas respostas na lista oficial...</p>";

      // Envia os dados de volta para o doPost do Google Sheets
      try {
        const response = await fetch(URL_API, {
          method: "POST",
          body: JSON.stringify({
            familia: familiaEncontrada.familia,
            membros: membrosAtualizados
          })
        });

        const res = await response.json();

        if (res.result === "success") {
          resultadoDiv.innerHTML = "<p style='color: #2f4f4f; font-weight: 600; text-align: center; font-size: 1.1rem; padding: 20px;'>✓ Presença atualizada com sucesso! Obrigado.</p>";
        } else {
          throw new Error();
        }
      } catch (error) {
        alert("Erro ao salvar. Tente novamente.");
        buscarFamilia(); // Recarrega a busca
      }
    }


    // ==========================================
    // LÓGICA DA LISTA DE PRESENTES (BUSCA E CARD)
    // ==========================================
    async function carregarPresentes() {
      const grid = document.getElementById("grid-presentes");
      
      try {
        // Envia o parâmetro para buscar exclusivamente os presentes
        const response = await fetch(`${URL_API}?tipo=presentes`);
        const presentes = await response.json();
        
        grid.innerHTML = "";

        if (presentes.length === 0) {
          grid.innerHTML = "<p class='loading'>Nenhum presente ativo no momento.</p>";
          return;
        }

        presentes.forEach(item => {
          const valorCota = item.valor_cota;
          const totalCotas = valorCota > 0 ? Math.round(item.valor_total / valorCota) : 1;
          const cotasVendidas = item.cotas_vendidas || 0;
          
          const porcentagem = Math.min(100, Math.round((cotasVendidas / totalCotas) * 100));
          const finalizado = cotasVendidas >= totalCotas;

          // Define a cor da barra baseada no avanço
          let classeCorBarra = "baixo";
          if (porcentagem > 40 && porcentagem < 100) {
            classeCorBarra = "medio";
          } else if (finalizado) {
            classeCorBarra = "concluido";
          }

          // Formatação dos preços
          const totalFormatado = item.valor_total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
          const cotaFormatada = valorCota.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

          const card = document.createElement("div");
          card.className = "card-presente";

          // Define o botão ou texto de finalizado
          const acaoBotao = finalizado 
            ? `<span class="presente-concluido-tag">✓ Presente Concluído!</span>`
            : `<button class="btn" style="width: 100%;" onclick="abrirModalContribuicao(${item.id}, '${item.nome}', ${item.valor_cota})">Presentear</button>`;

          card.innerHTML = `
            <div>
              <!-- Imagem do presente ou SVG minimalista padrão -->
              <div class="presente-imagem">
                ${item.imagem ? `<img src="${item.imagem}" alt="${item.nome}">` : `
                  <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="8" width="18" height="13" rx="2"/>
                    <path d="M12 8V3"/>
                    <path d="M12 3a2.5 2.5 0 0 1 2.5 2.5c0 1.5-2.5 2.5-2.5 2.5s-2.5-1-2.5-2.5A2.5 2.5 0 0 1 12 3z"/>
                    <path d="M3 12h18"/>
                  </svg>
                `}
              </div>
              
              <h3 class="presente-nome">${item.nome}</h3>
              <p class="presente-descricao">${item.descricao || ""}</p>
              
              <div class="presente-valores">
                <strong>Valor da cota:</strong> ${cotaFormatada} <br>
                <small style="color: #888;">Total do item: ${totalFormatado}</small>
              </div>
            </div>

            <div>
              <!-- Progresso das Cotas -->
              <div class="progresso-container">
                <div class="progresso-barra ${classeCorBarra}" style="width: ${porcentagem}%"></div>
              </div>
              <div class="texto-progresso">
                ${cotasVendidas} de ${totalCotas} cotas (${porcentagem}%)
              </div>
              
              <div class="presente-acao">
                ${acaoBotao}
              </div>
            </div>
          `;

          grid.appendChild(card);
        });

      } catch (error) {
        console.error("Erro ao obter presentes:", error);
        grid.innerHTML = "<p class='loading' style='color: red;'>Erro ao carregar lista de presentes.</p>";
      }
    }

    // Função de ação ao clicar no presente
    function abrirModalContribuicao(id, nome, valorCota) {
      alert(`Você escolheu presentear com uma cota para:\n👉 ${nome}\n\nValor da contribuição: R$ ${valorCota.toFixed(2).replace('.', ',')}\n\n(Aqui você poderá colocar o seu modal de Pix Copia e Cola ou Checkout de preferência!)`);
    }

    // Carrega a lista de presentes automaticamente quando o site abrir
    document.addEventListener("DOMContentLoaded", carregarPresentes);
  </script>

</body>
</html>
